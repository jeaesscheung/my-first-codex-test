<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>李旭导演工作室｜美学与动态叙事</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --ink: #1f1a17;
      --paper: rgba(255, 255, 255, 0.82);
      --line: rgba(44, 30, 20, 0.2);
      --primary: #7d2c2c;
      --secondary: #2e4a62;
      --accent: #b58a47;
      --muted: #5a4f49;
      --shadow: 0 20px 55px rgba(40, 25, 18, 0.18);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Songti SC", "STSong", "SimSun", "Noto Serif CJK SC", serif;
      line-height: 1.72;
      background:
        radial-gradient(circle at 10% 8%, rgba(181, 138, 71, 0.22), transparent 26%),
        radial-gradient(circle at 85% 12%, rgba(125, 44, 44, 0.16), transparent 28%),
        linear-gradient(150deg, #f7f3eb 0%, #f2eadd 55%, #efe4d4 100%);
      overflow-x: hidden;
    }

    .container { width: min(1160px, calc(100% - 38px)); margin: 0 auto; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      background: rgba(247, 242, 233, 0.72);
      border-bottom: 1px solid rgba(58, 44, 33, 0.14);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .brand { font-size: 19px; font-weight: 600; letter-spacing: 0.06em; }
    .brand span { color: var(--primary); }

    .links { display: flex; flex-wrap: wrap; gap: 10px; }
    .links a {
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      border-radius: 999px;
      font-size: 14px;
      padding: 7px 12px;
      transition: all .2s ease;
    }
    .links a:hover { color: var(--ink); border-color: var(--line); background: rgba(255,255,255,.5); }

    .hero {
      margin-top: 32px;
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: clamp(24px, 5vw, 58px);
      background: var(--paper);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -140px;
      top: -80px;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: conic-gradient(from 45deg, rgba(181,138,71,.26), rgba(46,74,98,.18), rgba(125,44,44,.2));
      filter: blur(14px);
      opacity: .75;
      z-index: -1;
      animation: float 13s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(18px) rotate(8deg); }
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 11px;
      border: 1px solid rgba(125, 44, 44, 0.28);
      color: var(--primary);
      font-size: 13px;
      letter-spacing: .08em;
    }

    h1 { font-size: clamp(32px, 6vw, 66px); line-height: 1.1; margin: 14px 0 18px; }
    .lead { max-width: 860px; color: var(--muted); font-size: 18px; margin: 0; }

    section { margin: 40px 0; }
    h2 { margin: 0 0 14px; font-size: clamp(24px, 3.4vw, 36px); }

    .grid-3, .grid-2 {
      display: grid;
      gap: 16px;
    }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 26px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: 0 10px 28px rgba(39, 28, 22, .08);
      padding: 18px;
    }

    .card h3 { margin: 0 0 10px; color: var(--secondary); }
    .card p, .card li { color: var(--muted); }
    ul { margin: 0; padding-left: 18px; }

    .timeline {
      border-left: 2px solid rgba(46, 74, 98, 0.35);
      padding-left: 14px;
    }
    .workbench {
      display: grid;
      grid-template-columns: 1.3fr .9fr;
      gap: 16px;
    }
    .mode-switch { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      background: rgba(255,255,255,.6);
      font-size: 13px;
    }
    .chip.active { background: var(--secondary); color: #fff; border-color: transparent; }
    .shot-grid { display: grid; gap: 10px; }
    .shot-card { cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; }
    .shot-card.active { border-color: rgba(46, 74, 98, 0.6); box-shadow: 0 12px 28px rgba(46, 74, 98, .14); transform: translateY(-2px); }
    .kv { display: grid; grid-template-columns: 80px 1fr; gap: 6px; font-size: 14px; }
    .queue-row { margin: 12px 0; }
    .queue-bar {
      height: 10px; border-radius: 999px; background: rgba(46,74,98,.12); overflow: hidden;
      position: relative;
    }
    .queue-fill { height: 100%; background: linear-gradient(90deg, #2e4a62, #b58a47); transition: width .35s ease; }
    .score-badge { font-size: 32px; color: var(--primary); margin: 6px 0; font-weight: 700; }
    .status-flow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .status-step { padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line); font-size: 12px; }
    .status-step.active { background: rgba(125,44,44,.13); border-color: rgba(125,44,44,.36); }

    .cta {
      padding: 24px;
      border: 1px solid rgba(181,138,71,.45);
      border-radius: 20px;
      background: linear-gradient(120deg, rgba(181,138,71,.17), rgba(125,44,44,.08));
    }

    footer {
      margin: 34px 0 20px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: 13px;
      color: #665750;
    }

    @media (max-width: 900px) {
      .grid-3, .grid-2, .workbench { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <div class="brand">李旭导演工作室 · <span>LX DIRECTOR STUDIO</span></div>
      <nav class="links" id="nav-links"></nav>
    </div>
  </header>

  <main class="container" id="app"></main>

  <script>
    const siteData = {
      nav: [
        { text: "创作定位", href: "#position" },
        { text: "动态工作流", href: "#workflow" },
        { text: "视觉语言", href: "#visual" },
        { text: "年度路线", href: "#roadmap" }
      ],
      hero: {
        tag: "DIRECTOR OFFICIAL SITE",
        title: "李旭导演工作室：以东方美学，打造动态影像叙事现场",
        lead: "网站整体以宋体系统为视觉骨架，强调留白、层次与色彩韵律。全部模块由数据驱动渲染，可按项目实时更新作品、流程、团队与宣发信息。"
      },
      positionCards: [
        { title: "作者性核心", desc: "导演主导主题、人物与镜头调度，确保风格完整与情绪一致。" },
        { title: "动态内容系统", desc: "页面内容由 JSON 数据驱动，新增项目、作品与档期无需改动版式结构。" },
        { title: "审美表达", desc: "采用赭红、青黛、金砂三组配色，构建克制而有张力的东方电影质感。" }
      ],
      workflow: [
        {
          title: "01 概念发展",
          points: ["输入主题、人物与时代语境。", "生成创作母题与风格板，并更新首页重点内容。"]
        },
        {
          title: "02 剧本分析",
          points: ["自动拆解场次、情绪、节奏与冲突。", "形成可追踪的导演工作台数据流。"]
        },
        {
          title: "03 分镜生成",
          points: ["按镜头组动态加载分镜、色脚本与音效意图。", "支持版本迭代与对比展示。"]
        },
        {
          title: "04 发布传播",
          points: ["自动同步媒体新闻、展映计划与合作动态。", "形成“创作—生产—传播”闭环。"]
        }
      ],
      visual: [
        {
          title: "字体系统",
          body: "全站默认宋体系列（Songti SC / STSong / SimSun），用于强化文学性与电影文本感。"
        },
        {
          title: "配色系统",
          body: "主色赭红表达作者锋芒，辅助青黛强调理性结构，金砂用于高光信息与品牌记忆点。"
        }
      ],
      roadmap: [
        { title: "Q1：官网上线", body: "完成首页、作品页、团队页与联系页动态化结构。" },
        { title: "Q2：作品档案", body: "上线项目时间轴、分镜库与幕后手记模块。" },
        { title: "Q3：媒体联动", body: "接入新闻流、采访与展映信息自动更新能力。" },
        { title: "Q4：国际化", body: "推出中英双语动态站点与海外传播素材库。" }
      ],
      cta: "如需下一步，可继续扩展：作品详情模板、团队成员库、媒体中心、合作提案下载与后台内容管理。",
      shots: [
        { id: "S01", title: "雨夜对峙", prompt: "霓虹雨夜，主角逆光站立，情绪压迫，35mm电影颗粒", lens: "中近景", move: "缓慢推进", risk: "反射过亮导致人脸细节丢失", score: 91 },
        { id: "S02", title: "走廊追逐", prompt: "狭长走廊，高对比硬光，急促呼吸，手持跟拍", lens: "全景", move: "手持跟随", risk: "运动模糊过强造成动作不可读", score: 84 },
        { id: "S03", title: "窗前独白", prompt: "清晨冷调窗光，人物侧脸，情绪克制，低饱和", lens: "特写", move: "轻微摇镜", risk: "肤色偏灰，情绪层次不足", score: 95 }
      ],
      pipeline: ["解析剧本", "生成分镜", "锁定角色", "进入质检"]
    };

    function useState(initial) {
      let state = initial;
      const get = () => state;
      const set = (next) => {
        state = typeof next === "function" ? next(state) : next;
        renderWorkbench();
      };
      return [get, set];
    }

    function renderList(items) {
      return items.map((item) => `<li>${item}</li>`).join("");
    }

    function renderCards(cards) {
      return cards.map((c) => `
        <article class="card">
          <h3>${c.title}</h3>
          <p>${c.desc || c.body}</p>
        </article>
      `).join("");
    }
    const [getMode, setMode] = useState("剧本模式");
    const [getShotId, setShotId] = useState(siteData.shots[0].id);
    const [getQueueProgress, setQueueProgress] = useState({ H100: 18, RTX5090: 42 });
    const [getPipelineStep, setPipelineStep] = useState(0);

    document.getElementById("nav-links").innerHTML = siteData.nav
      .map((n) => `<a href="${n.href}">${n.text}</a>`)
      .join("");

    document.getElementById("app").innerHTML = `
      <section class="hero" id="position">
        <span class="tag">${siteData.hero.tag}</span>
        <h1>${siteData.hero.title}</h1>
        <p class="lead">${siteData.hero.lead}</p>
        <div class="grid-3">${renderCards(siteData.positionCards)}</div>
      </section>

      <section id="workflow">
        <h2>导演动态工作流</h2>
        <div class="grid-2">
          ${siteData.workflow.map((item) => `
            <article class="card">
              <h3>${item.title}</h3>
              <ul>${renderList(item.points)}</ul>
            </article>
          `).join("")}
        </div>
      </section>

      <section id="visual">
        <h2>美学布局与视觉表达</h2>
        <div class="grid-2">${renderCards(siteData.visual)}</div>
      </section>

      <section id="roadmap">
        <h2>动态内容年度规划</h2>
        <div class="grid-2">
          ${siteData.roadmap.map((item) => `
            <article class="card timeline">
              <h3>${item.title}</h3>
              <p>${item.body}</p>
            </article>
          `).join("")}
        </div>
      </section>

      <section class="cta">
        <h2>下一步扩展建议</h2>
        <p>${siteData.cta}</p>
      </section>

      <section id="ai-workbench">
        <h2>AI 导演工作台 Demo</h2>
        <div class="workbench">
          <article class="card">
            <div class="mode-switch" id="mode-switch"></div>
            <div class="shot-grid" id="shot-grid"></div>
          </article>
          <aside class="card" id="detail-panel"></aside>
        </div>
      </section>

      <footer>
        李旭导演工作室官方网站提案（动态版）。页面内容已支持数据驱动渲染，可持续迭代更新。
      </footer>
    `;

    function animateQueue() {
      const nextH100 = Math.min(100, getQueueProgress().H100 + 14);
      const next5090 = Math.min(100, getQueueProgress().RTX5090 + 11);
      setQueueProgress({ H100: nextH100, RTX5090: next5090 });
    }

    function advancePipeline() {
      setPipelineStep((prev) => (prev + 1) % siteData.pipeline.length);
      animateQueue();
    }

    function renderWorkbench() {
      const current = siteData.shots.find((s) => s.id === getShotId()) || siteData.shots[0];
      const modeEl = document.getElementById("mode-switch");
      const shotGridEl = document.getElementById("shot-grid");
      const detailEl = document.getElementById("detail-panel");
      if (!modeEl || !shotGridEl || !detailEl) return;

      const modes = ["剧本模式", "分镜模式", "审片模式"];
      modeEl.innerHTML = modes.map((mode) => `<button class="chip ${getMode() === mode ? "active" : ""}" data-mode="${mode}">${mode}</button>`).join("");

      shotGridEl.innerHTML = siteData.shots.map((shot) => `
        <article class="card shot-card ${shot.id === current.id ? "active" : ""}" data-shot="${shot.id}">
          <h3>${shot.id} · ${shot.title}</h3>
          <p>景别：${shot.lens} ｜ 运镜：${shot.move}</p>
        </article>
      `).join("");

      detailEl.innerHTML = `
        <h3>${current.id} 镜头详情</h3>
        <div class="kv"><strong>提示词</strong><span>${current.prompt}</span></div>
        <div class="kv"><strong>景别</strong><span>${current.lens}</span></div>
        <div class="kv"><strong>运镜</strong><span>${current.move}</span></div>
        <div class="kv"><strong>风险</strong><span>${current.risk}</span></div>
        <hr style="border:none;border-top:1px solid var(--line);margin:14px 0;" />
        <h3>任务队列分配</h3>
        <div class="queue-row">H100
          <div class="queue-bar"><div class="queue-fill" style="width:${getQueueProgress().H100}%"></div></div>
        </div>
        <div class="queue-row">RTX 5090
          <div class="queue-bar"><div class="queue-fill" style="width:${getQueueProgress().RTX5090}%"></div></div>
        </div>
        <h3>质检评分面板</h3>
        <div class="score-badge">${current.score}</div>
        <p style="margin-top:0;color:var(--muted)">当前模式：${getMode()}，评分会随镜头上下文变化。</p>
        <button class="chip" id="status-btn">推进生成状态</button>
        <div class="status-flow">
          ${siteData.pipeline.map((p, idx) => `<span class="status-step ${idx <= getPipelineStep() ? "active" : ""}">${p}</span>`).join("")}
        </div>
      `;

      modeEl.querySelectorAll("[data-mode]").forEach((btn) => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
      shotGridEl.querySelectorAll("[data-shot]").forEach((card) => card.addEventListener("click", () => setShotId(card.dataset.shot)));
      detailEl.querySelector("#status-btn").addEventListener("click", advancePipeline);
    }

    renderWorkbench();
  </script>
</body>
</html>
